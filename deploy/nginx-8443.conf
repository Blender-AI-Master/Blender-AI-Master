# ============================================================
# blender-ai.com  (Production nginx config)
#  - 80    : HTTP → 301 → HTTPS
#  - 443   : HTTPS 静态站点 (blender-ai.com 前端)
#  - 8443  : HTTPS API  (Blender 插件用,PRODUCTION_BASE_URL)
# ============================================================
# 部署步骤:
#   1. 上传 BlenderAiMaster\ 到 /opt/blender-ai/  (用 git 或 rsync)
#   2. cd /opt/blender-ai/website/Blender_AI_Master_H
#   3. cp .env.example .env  &&  nano .env   (填好 HUNYUAN_*/STRIPE_*/PORT=3001)
#   4. npm ci && npm run build
#   5. 把 blender-ai.com.pem / .key 放到 /etc/nginx/ssl/blender-ai.com/
#   6. 把本文件 + blender-ai.com-443.conf 软链到 /etc/nginx/conf.d/
#   7. nginx -t  &&  systemctl reload nginx
#   8. systemctl enable --now blender-ai-api
# ============================================================

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name www.blender-ai.com blender-ai.com;

    ssl_certificate     /etc/nginx/ssl/blender-ai.com/blender-ai.com.pem;
    ssl_certificate_key /etc/nginx/ssl/blender-ai.com/blender-ai.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 客户端 PRODUCTION_BASE_URL = https://www.blender-ai.com:8443
    # → 插件发请求 https://www.blender-ai.com:8443/v1/...
    location /v1/ {
        proxy_pass         http://127.0.0.1:3001;     # ← Node API 端口 (见 .env PORT)
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;            # 3D 生成任务长
        proxy_send_timeout 900s;
        proxy_buffering    off;
    }

    # 健康检查 (无认证,可被 LB / 监控 ping)
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        access_log off;
    }

    access_log /var/log/nginx/blender-ai-api.access.log;
    error_log  /var/log/nginx/blender-ai-api.error.log;
}
