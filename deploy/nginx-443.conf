# ============================================================
# blender-ai.com  (Static website + HTTP→HTTPS redirect)
# Port 443: 前端静态站 (React/Vite build → /var/www/blender-ai/dist)
# Port 80 : 全部 301 → HTTPS
# ============================================================
# 这一份是 *配套* 8443.conf 使用的;不要单独放上去。
# 如果你只想跑 API,把整段注释掉,只保留 nginx-8443.conf。
# ============================================================

# --- HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name www.blender-ai.com blender-ai.com;
    return 301 https://$host$request_uri;
}

# --- HTTPS static site ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.blender-ai.com blender-ai.com;

    ssl_certificate     /etc/nginx/ssl/blender-ai.com/blender-ai.com.pem;
    ssl_certificate_key /etc/nginx/ssl/blender-ai.com/blender-ai.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000" always;

    root /var/www/blender-ai/dist;     # ← website/blender-ai-master/dist
    index index.html;

    # SPA fallback: 任何未匹配的 path 都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长 cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 不缓存 index.html (避免发布后用户拿到旧版)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    access_log /var/log/nginx/blender-ai-web.access.log;
    error_log  /var/log/nginx/blender-ai-web.error.log;
}
